services:
  - type: web
    name: split-smart
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

# Notes
# ----
# Free plan: no persistent disk, so the SQLite database resets on each cold
# start or deploy. The seed runs on every boot, so demo data is always fresh.
#
# For persistent data, upgrade to the starter plan and add:
#   plan: starter
#   disk:
#     name: data
#     mountPath: /data
#     sizeGB: 1
# and add an env var DB_PATH=/data/data.db
